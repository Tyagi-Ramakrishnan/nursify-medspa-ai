services:
  - type: web
    name: nursify-medspa-ai
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nursify-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: FRONTEND_URL
        value: https://nursify-medspa-ai.onrender.com
      - key: QB_CLIENT_ID
        value: your_quickbooks_client_id
      - key: QB_CLIENT_SECRET
        value: your_quickbooks_client_secret
      - key: QB_REDIRECT_URI
        value: https://nursify-medspa-ai.onrender.com/api/v1/quickbooks/callback
      - key: QB_ENVIRONMENT
        value: sandbox
      - key: SMTP_HOST
        value: smtp.sendgrid.net
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: apikey
      - key: SMTP_PASSWORD
        value: your_sendgrid_api_key
      - key: REPORT_FROM_EMAIL
        value: reports@nursify.com
      - key: REPORT_TO_EMAIL
        value: owner@nursify.com
      - key: ADMIN_EMAIL
        value: admin@nursify.com
      - key: ADMIN_PASSWORD
        generateValue: true

databases:
  - name: nursify-db
    databaseName: nursify
    user: nursify
